name: CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "ai-engine/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ Go 后端 Lint + Test ============
  backend-ci:
    name: Backend (Go) CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: linximanager_test
          POSTGRES_USER: linxi
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: linximanager_test
          DB_USER: linxi
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: test_jwt_secret_32_characters_ok
          APP_ENV: test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.out
          flags: backend
        continue-on-error: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" \
            -o /tmp/backend-build ./cmd/server/main.go

  # ============ Vue3 管理后台 Lint + Build ============
  admin-ci:
    name: Admin (Vue3) CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check || true

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://linximanager.com

  # ============ Python AI 引擎 Lint + Test ============
  ai-engine-ci:
    name: AI Engine (Python) CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest pytest-asyncio

      - name: Lint
        run: flake8 app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Run tests
        run: pytest tests/ -v || true

  # ============ Docker Build 验证 ============
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-ci, admin-ci]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./deploy/docker/backend.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: linximanager/backend:pr-${{ github.event.pull_request.number }}

      - name: Build admin image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/admin
          file: ./deploy/docker/admin.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: linximanager/admin:pr-${{ github.event.pull_request.number }}
