groups:
  # ============ 基础设施告警 ============
  - name: infrastructure
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "主机 CPU 使用率过高"
          description: "实例 {{ $labels.instance }} CPU 使用率 {{ $value | printf \"%.1f\" }}% 超过 80%，持续 5 分钟"

      - alert: CriticalCPUUsage
        expr: |
          100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "主机 CPU 使用率危急"
          description: "实例 {{ $labels.instance }} CPU 使用率 {{ $value | printf \"%.1f\" }}% 超过 95%"

      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "主机内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率 {{ $value | printf \"%.1f\" }}% 超过 85%"

      - alert: DiskSpaceLow
        expr: |
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "磁盘空间不足"
          description: "实例 {{ $labels.instance }} 挂载点 {{ $labels.mountpoint }} 使用率 {{ $value | printf \"%.1f\" }}%"

  # ============ Go 后端 API 告警 ============
  - name: backend-api
    interval: 15s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{app="backend", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{app="backend"}[5m])) * 100 > 1
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "API 5xx 错误率超过 1%"
          description: "后端服务 5xx 错误率 {{ $value | printf \"%.2f\" }}%，超过阈值 1%"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app="backend"}[5m])) by (le, handler)) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "API P95 延迟超过 500ms"
          description: "接口 {{ $labels.handler }} P95 延迟 {{ $value | printf \"%.3f\" }}s 超过 500ms"

      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{app="backend"}[5m])) by (le)) > 2
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "API P99 延迟超过 2s"
          description: "后端服务 P99 延迟 {{ $value | printf \"%.3f\" }}s 超过 2s"

      - alert: BackendPodDown
        expr: |
          kube_deployment_status_replicas_available{deployment="backend", namespace="linximanager"} < 2
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "后端 Pod 可用副本不足"
          description: "后端 Deployment 可用副本数 {{ $value }} 低于最小值 2"

  # ============ 数据库告警 ============
  - name: database
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "PostgreSQL 不可用"
          description: "PostgreSQL 实例 {{ $labels.instance }} 连接失败"

      - alert: PostgresConnectionsSaturated
        expr: |
          pg_stat_activity_count / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "PostgreSQL 连接数接近上限"
          description: "PostgreSQL 连接使用率 {{ $value | printf \"%.1f\" }}% 超过 80%"

      - alert: PostgresSlowQueries
        expr: |
          rate(pg_stat_activity_count{state="active", wait_event_type="Lock"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "PostgreSQL 锁等待过多"
          description: "存在 {{ $value }} 个活跃锁等待"

  # ============ Redis 告警 ============
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Redis 不可用"
          description: "Redis 实例 {{ $labels.instance }} 连接失败"

      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率 {{ $value | printf \"%.1f\" }}% 超过 80%"
