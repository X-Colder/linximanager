# 敏感配置模板 - 所有 value 均为 base64 占位符
# 生产部署前需替换为实际值: echo -n "your_value" | base64
# 推荐使用 Sealed Secrets 或外部 Secret 管理工具（Vault/AWS Secrets Manager）
apiVersion: v1
kind: Secret
metadata:
  name: linxi-secret
  namespace: linximanager
type: Opaque
data:
  # PostgreSQL
  DB_HOST: cG9zdGdyZXMtc2VydmljZQ==          # postgres-service
  DB_USER: bGlueGk=                            # linxi
  DB_PASSWORD: CHANGE_ME_BASE64               # 替换为实际密码的 base64

  # Redis
  REDIS_HOST: cmVkaXMtc2VydmljZQ==            # redis-service
  REDIS_PASSWORD: CHANGE_ME_BASE64            # 替换为实际密码的 base64

  # MinIO
  MINIO_ACCESS_KEY: CHANGE_ME_BASE64          # 替换为实际 AccessKey 的 base64
  MINIO_SECRET_KEY: CHANGE_ME_BASE64          # 替换为实际 SecretKey 的 base64

  # Meilisearch
  MEILI_MASTER_KEY: CHANGE_ME_BASE64          # 替换为实际 MasterKey 的 base64

  # JWT
  JWT_SECRET: CHANGE_ME_BASE64               # 替换为 32 位随机字符串的 base64

  # 微信支付
  WECHAT_APP_ID: CHANGE_ME_BASE64
  WECHAT_MCH_ID: CHANGE_ME_BASE64
  WECHAT_API_KEY: CHANGE_ME_BASE64

  # AI LLM
  LLM_API_KEY: CHANGE_ME_BASE64
